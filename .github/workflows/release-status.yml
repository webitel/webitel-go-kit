name: Release status

# Maintains RELEASE-STATUS.md at the repo root — a table of every Go module
# in the repo with:
#   - The latest released version (highest <module>/vX.Y.Z tag)
#   - Number of commits on main since that tag that touched files in the
#     module's directory
#   - A status: "released" / "needs release" / "never released"
#
# Triggers:
#   - push to main            → keep status fresh after every change
#   - push of a release tag   → reflect a just-released module immediately
#   - daily cron              → safety net in case a push is missed
#   - workflow_dispatch       → manual refresh from the Actions tab
#
# How it commits:
#   Pushes the refreshed RELEASE-STATUS.md directly to `main` using a
#   GitHub App token. The App must be in the branch-protection bypass list
#   for `main` — otherwise this workflow will fail on the push step.
#
# Loop safety: the push only changes RELEASE-STATUS.md, and `paths-ignore`
# on the `push:branches` trigger skips re-runs when only that file changes,
# so the workflow cannot re-trigger itself.

on:
  push:
    branches: [main]
    tags:
      - '**/v[0-9]+.[0-9]+.[0-9]+'
      - '**/v[0-9]+.[0-9]+.[0-9]+-*'

    paths-ignore:
      - 'RELEASE-STATUS.md'

  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:

permissions:
  contents: read

# Serialize runs so that two releases dispatched back-to-back can't race
# each other on the push to main. The second run queues behind the first
# and then sees the already-updated file via `ref: main` checkout, so it
# incrementally adds its own delta.
concurrency:
  group: release-status
  cancel-in-progress: false

jobs:
  status:
    runs-on: ubuntu-latest
    name: Sync
    steps:
      - name: Create Github APP token
        id: app-token
        uses: webitel/reusable-workflows/actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.DELIVERY_BOT_APP_ID }}
          private-key: ${{ secrets.DELIVERY_BOT_APP_PEM }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate status table
        id: gen
        run: |
          set -euo pipefail

          : > /tmp/status-table.txt
          {
            echo "| Module | Latest released | Unreleased commits | Status |"
            echo "|---|---|---|---|"
          } >> /tmp/status-table.txt

          while IFS= read -r mod_dir; do
            [[ -z "$mod_dir" ]] && continue
            LATEST=$(git tag --list "${mod_dir}/v[0-9]*.[0-9]*.[0-9]*" \
              | sort -V | tail -n 1 || true)

            if [[ -z "$LATEST" ]]; then
              VERSION="(none)"
              COUNT=$(git rev-list HEAD -- "$mod_dir" 2>/dev/null | wc -l | tr -d ' ')
              STATUS="never released"
            else
              VERSION="${LATEST##*/}"
              COUNT=$(git rev-list "${LATEST}..HEAD" -- "$mod_dir" 2>/dev/null \
                | wc -l | tr -d ' ')
              if [[ "$COUNT" == "0" ]]; then
                STATUS="up to date"
              else
                STATUS="needs release"
              fi
            fi

            echo "| \`${mod_dir}\` | \`${VERSION}\` | ${COUNT} | ${STATUS} |" \
              >> /tmp/status-table.txt
          done < <(find . -name go.mod -not -path './.git/*' -not -path '*/vendor/*' \
                   -exec dirname {} \; | sed 's|^\./||' | sort)

          # If RELEASE-STATUS.md already exists and the table is identical,
          # there is nothing to do.
          if [[ -f RELEASE-STATUS.md ]]; then
            CURRENT_TABLE=$(awk '/^\| Module/,/^$/' RELEASE-STATUS.md \
              | sed '/^$/d' || true)
            NEW_TABLE=$(cat /tmp/status-table.txt)
            if [[ "$CURRENT_TABLE" == "$NEW_TABLE" ]]; then
              echo "::notice::RELEASE-STATUS.md already current"
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Write the full file. We deliberately do NOT include a "last
          # refreshed at <timestamp>" line — git history is the source of
          # truth for "when did this last change", and a timestamp would
          # cause every cron run to produce a diff even when the table is
          # identical.
          {
            echo "<!-- AUTOGENERATED by .github/workflows/release-status.yml — do not edit by hand -->"
            echo "# Release status"
            echo
            echo "This file is regenerated automatically. To refresh manually, dispatch"
            echo "the \`release-status\` workflow from the Actions tab."
            echo
            echo "**Status meanings:**"
            echo "- \`up to date\` — every commit touching this module is already in a tag"
            echo "- \`needs release\` — there are commits on main that have not been released yet"
            echo "- \`never released\` — module exists but has no \`<module>/vX.Y.Z\` tag"
            echo
            cat /tmp/status-table.txt
            echo
            echo "**How to release a module:** dispatch the \`release\` workflow from the"
            echo "Actions tab, choose the module, choose a bump kind (\`patch\` / \`minor\` /"
            echo "\`major\`). The workflow computes the next version from the last tag."
          } > RELEASE-STATUS.md

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "New RELEASE-STATUS.md content:"
          cat RELEASE-STATUS.md

      - name: Commit and push to main
        if: steps.gen.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name  "${{ steps.app-token.outputs.user-name }}"
          git config user.email "${{ steps.app-token.outputs.user-email }}"

          git add RELEASE-STATUS.md
          git commit -m "chore(ci): refresh RELEASE-STATUS.md"
          git push origin "HEAD:main"

      - name: Summary
        if: always()
        run: |
          {
            echo "## release-status"
            if [[ "${{ steps.gen.outputs.changed }}" == "true" ]]; then
              echo "Status table changed. Updated \`RELEASE-STATUS.md\`."
              echo
              echo '```'
              cat /tmp/status-table.txt 2>/dev/null || true
              echo '```'
            else
              echo "No changes to \`RELEASE-STATUS.md\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
